<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Visualizer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/9.10.2/jsoneditor.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/9.10.2/jsoneditor.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #json-input {
            width: 100%;
            height: 150px;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
        }
        #jsoneditor {
            width: 100%;
            height: 400px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            align-self: flex-start;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="json-input">Paste your JSON here:</label>
        <textarea id="json-input" placeholder='{"name": "John", "age": 30}'></textarea>
        <button id="visualize-btn">Visualize JSON</button>
    </div>

    <div id="jsoneditor"></div>

    <script>
        const container = document.getElementById("jsoneditor");
        const inputArea = document.getElementById("json-input");
        const button = document.getElementById("visualize-btn");

        const options = {
            mode: 'view',
            modes: ['view', 'tree', 'code']
        };

        const editor = new JSONEditor(container, options);

        button.addEventListener('click', () => {
            try {
                const jsonString = inputArea.value.trim();
                
                if (!jsonString) {
                    alert("Please enter some JSON text.");
                    return;
                }

                const jsonObject = JSON.parse(jsonString);
                editor.set(jsonObject);
                editor.expandAll();
            } catch (error) {
                alert("Invalid JSON format: " + error.message);
            }
        });
    </script>
</body>
</html>
